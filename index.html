<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrueFactoryPrice AI | 供應鏈偵察終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 3️⃣ 雷達掃描動畫 */
        .radar {
            position: absolute;
            width: 200%;
            height: 200%;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: radar 2s infinite;
        }
        @keyframes radar {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [step, setStep] = useState('home');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [showScript, setShowScript] = useState(false);

            const handleUpload = (e) => {
                if (!e.target.files[0]) return;
                setLoading(true);
                setTimeout(() => {
                    setResult({
                        name: "Modern Canvas Wall Art",
                        factory_price: 2.15,
                        retail_price: 39.99,
                        markup: 1758,
                        saving: 92
                    });
                    setLoading(false);
                    setStep('result');
                }, 3000);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-[#020617] overflow-hidden">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center z-20">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/30">
                                <Icon name="cpu" className="w-5 h-5 text-white" />
                            </div>
                            <span className="font-bold tracking-tighter text-xl italic">TRUE FACTORY AI</span>
                        </div>
                        <Icon name="bell" className="w-5 h-5 text-slate-500" />
                    </header>

                    <main className="flex-1 px-6 flex flex-col justify-center pb-24 overflow-y-auto">
                        {step === 'home' ? (
                            <div className="space-y-8 animate-in fade-in duration-700">
                                {/* 1️⃣ 信息層級優化 */}
                                <div className="space-y-2">
                                    <h2 className="text-5xl font-black italic leading-[0.8] tracking-tighter">REVEAL THE <br/><span className="text-blue-500">TRUTH.</span></h2>
                                    <p className="text-slate-400 text-sm leading-relaxed">
                                        Discover the real Chinese factory price behind viral products.
                                    </p>
                                </div>

                                {/* 2️⃣ 虛線邊框上傳按鈕 */}
                                <div className="relative overflow-hidden group">
                                    <input type="file" accept="image/*" onChange={handleUpload} className="hidden" id="upload" />
                                    <label htmlFor="upload" className="block glass p-14 cursor-pointer text-center transition-all hover:bg-blue-600/10 border-2 border-dashed border-blue-500/40 relative overflow-hidden rounded-[40px]">
                                        {loading && (
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="radar"></div>
                                                <div className="radar" style={{animationDelay: '1s'}}></div>
                                                <div className="scanning-line"></div>
                                            </div>
                                        )}
                                        <div className="mb-6 flex justify-center relative z-10">
                                            <Icon name={loading ? "target" : "scan-eye"} className={`w-16 h-16 ${loading ? 'text-blue-400 animate-pulse' : 'text-blue-500'}`} />
                                        </div>
                                        <span className="text-2xl font-bold block mb-2 relative z-10 uppercase italic tracking-tight">
                                            {loading ? "AI Scanning..." : "Initialize Scan"}
                                        </span>
                                    </label>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-5 animate-in slide-in-from-bottom-10 duration-500">
                                {/* 4️⃣ 產品信息模塊 */}
                                <div className="glass p-6 rounded-[32px] border-blue-500/20">
                                    <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Detected Product</p>
                                    <p className="text-xl font-bold italic tracking-tight">{result.name}</p>
                                </div>

                                {/* 5️⃣ 市場價對比矩陣 */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass p-6 rounded-[32px] text-center border-white/5">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase mb-2">Retail Price</p>
                                        <p className="text-2xl font-bold text-slate-400 line-through opacity-50">${result.retail_price}</p>
                                    </div>
                                    <div className="bg-blue-600 p-6 rounded-[32px] text-center shadow-xl shadow-blue-500/20">
                                        <p className="text-[10px] text-blue-100 font-bold uppercase mb-2">Factory Base</p>
                                        <p className="text-3xl font-black">${result.factory_price}</p>
                                    </div>
                                </div>

                                <div className="glass p-6 rounded-[32px] flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Markup Analysis</p>
                                        <p className="text-2xl font-black text-blue-500">+{result.markup}%</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Potential Saving</p>
                                        <p className="text-2xl font-black text-green-400">{result.saving}%</p>
                                    </div>
                                </div>

                                {/* 6️⃣ TikTok 腳本彈窗邏輯 */}
                                <button 
                                    onClick={() => setShowScript(true)}
                                    className="w-full bg-white text-black py-6 rounded-[32px] font-black text-lg flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl"
                                >
                                    <Icon name="video" className="w-6 h-6" /> GENERATE TIKTOK SCRIPT
                                </button>
                                
                                <button onClick={() => setStep('home')} className="w-full text-slate-600 text-[10px] font-bold tracking-[0.4em] uppercase">Terminate & Restart</button>
                            </div>
                        )}
                    </main>

                    {/* 6️⃣ 腳本卡片組件 */}
                    {showScript && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#020617]/90 backdrop-blur-sm animate-in fade-in duration-300">
                            <div className="glass w-full max-w-sm rounded-[40px] p-8 space-y-6 relative border-blue-500/30">
                                <button onClick={() => setShowScript(false)} className="absolute top-6 right-6 text-slate-500"><Icon name="x" className="w-6 h-6" /></button>
                                <h3 className="text-2xl font-black italic text-blue-500 flex items-center gap-2"><Icon name="zap" className="w-5 h-5" /> 15s Viral Script</h3>
                                <div className="space-y-4 text-sm leading-relaxed">
                                    <div><span className="text-blue-500 font-bold mr-2">HOOK:</span> "This ${result.retail_price} product costs only ${result.factory_price} in China!"</div>
                                    <div><span className="text-blue-500 font-bold mr-2">REVEAL:</span> "Look what I found behind the global supply chain secrets."</div>
                                    <div><span className="text-blue-500 font-bold mr-2">CTA:</span> "Stop being overcharged. Follow for more factory hacks!"</div>
                                </div>
                                <button className="w-full py-4 bg-blue-600 rounded-2xl font-bold flex items-center justify-center gap-2"><Icon name="copy" className="w-4 h-4" /> Copy Script</button>
                            </div>
                        </div>
                    )}

                    {/* 7️⃣ 底部導航欄 */}
                    <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 grid grid-cols-3 glass border-t-0 rounded-t-[40px] z-40 bg-[#0f172a]/80">
                        <div className="flex flex-col items-center gap-1 text-blue-500">
                            <Icon name="scan" className="w-6 h-6" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Scan</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 text-slate-600">
                            <Icon name="trending-up" className="w-6 h-6" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Trends</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 text-slate-600">
                            <Icon name="user" className="w-6 h-6" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Profile</span>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
