<!DOCTYPE html>
<html lang="zh-TW" translate="no"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>工廠底價 AI | 供應鏈黑客系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* 40px 超大圓角與磨砂玻璃 */
        .glass { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px; 
        }

        .neon-glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }

        /* 賽博掃描線動畫 */
        .scanning-line { 
            height: 3px; 
            background: linear-gradient(90deg, transparent, #3b82f6, transparent); 
            position: absolute; 
            width: 100%; 
            top: 0; 
            box-shadow: 0 0 15px #3b82f6;
            animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }

        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        .title-italic { font-style: italic; font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [step, setStep] = useState('home');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleUpload = (e) => {
                if (!e.target.files[0]) return;
                setLoading(true);
                // 模擬 AI 掃描過程
                setTimeout(() => {
                    setResult({
                        name: "現代極簡無框畫",
                        factory_price: 2.15,
                        retail_price: 39.99,
                        saving: 92,
                        viral_score: 95,
                        material: "高密度化纖油畫布"
                    });
                    setLoading(false);
                    setStep('result');
                }, 2500);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative p-6">
                    {/* 頂部導航 */}
                    <header className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-2">
                            <div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center neon-glow">
                                <Icon name="cpu" className="w-5 h-5 text-white" />
                            </div>
                            <span className="title-italic text-2xl uppercase">真實底價 <span className="text-blue-500">AI</span></span>
                        </div>
                        <div className="text-[10px] border border-blue-500/40 px-3 py-1 rounded-full text-blue-400 font-bold bg-blue-500/5 tracking-widest">
                            安全加密連線
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col justify-center">
                        {step === 'home' ? (
                            <div className="space-y-10 animate-in fade-in duration-700">
                                <div>
                                    <h2 className="text-6xl title-italic leading-[0.85] mb-6">
                                        揭發 <br/><span className="text-blue-500">價格真相</span>
                                    </h2>
                                    <p className="text-slate-400 text-sm leading-relaxed max-w-[260px]">
                                        採用 DEEPSEEK 視覺引擎。<br/>
                                        一鍵透視中國源頭工廠底價，終結價格不透明。
                                    </p>
                                </div>

                                {/* 上傳區域 */}
                                <div className="relative overflow-hidden group">
                                    <input type="file" accept="image/*" onChange={handleUpload} className="hidden" id="upload" />
                                    <label htmlFor="upload" className="block glass p-16 cursor-pointer text-center transition-all hover:bg-blue-600/10 border-blue-500/20 active:scale-95">
                                        {loading && <div className="scanning-line"></div>}
                                        <div className="mb-8 flex justify-center transform group-hover:scale-110 transition-transform">
                                            <div className="p-6 rounded-full bg-blue-500/10 border border-blue-500/30">
                                                <Icon name={loading ? "target" : "scan"} className="w-14 h-14 text-blue-500" />
                                            </div>
                                        </div>
                                        <span className="text-3xl font-black block mb-2 tracking-tight">
                                            {loading ? "正在解析供應鏈..." : "啟動視覺偵察"}
                                        </span>
                                        <span className="text-slate-500 text-xs tracking-[0.3em] font-bold">上傳產品圖或現場拍攝</span>
                                    </label>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-12 duration-500">
                                {/* 結果顯示 */}
                                <div className="glass p-10 text-center neon-glow border-blue-500/30 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 opacity-50"></div>
                                    <p className="text-[11px] font-black text-blue-400 mb-4 tracking-[0.4em] uppercase italic">源頭工廠底價</p>
                                    <div className="flex items-center justify-center gap-1">
                                        <span className="text-7xl font-black italic text-white tracking-tighter leading-none">${result.factory_price}</span>
                                    </div>
                                    <p className="mt-4 text-[10px] text-slate-500 font-bold tracking-widest uppercase italic">預估毛利率已扣除</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass p-6 text-center border-white/5">
                                        <span className="text-[10px] text-slate-500 block mb-1 font-bold tracking-widest italic">海外零售估價</span>
                                        <span className="text-2xl font-bold text-slate-500 line-through opacity-40">${result.retail_price}</span>
                                    </div>
                                    <div className="glass p-6 text-center border-blue-500/20">
                                        <span className="text-[10px] text-blue-400 block mb-1 font-bold tracking-widest italic">爆款潛力分數</span>
                                        <span className="text-2xl font-black text-blue-400">{result.viral_score}</span>
                                    </div>
