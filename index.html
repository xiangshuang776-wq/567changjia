<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUE AI | Supply Chain Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000000; 
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 24px 24px; /* 點陣背景質感 */
            color: #ffffff; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            margin: 0; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 巨大圓形掃描按鈕：液態漸變感 */
        .ai-core-btn {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), inset 0 0 30px rgba(59,130,246,0.1);
        }
        .ai-core-btn:hover { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 40px rgba(59,130,246,0.2); }
        .ai-core-btn:active { transform: scale(0.96); }

        .inner-glow {
            position: absolute; inset: 10px; border-radius: 50%;
            background: radial-gradient(circle at 50% 0%, rgba(59,130,246,0.4), transparent 70%);
            pointer-events: none;
        }

        .liquid-scan {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 1px solid #3b82f6;
            animation: liquid 3s infinite cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        @keyframes liquid {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [step, setStep] = useState('home');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleUpload = (e) => {
                if (!e.target.files[0]) return;
                setLoading(true);
                setTimeout(() => {
                    setResult({ name: "Modern Canvas Art", factory: 2.15, retail: 39.99, markup: 1758 });
                    setLoading(false);
                    setStep('result');
                }, 2800);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative">
                    {/* Header: 極簡點綴 */}
                    <header className="p-10 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div>
                            <span className="font-black tracking-[0.2em] text-[10px] opacity-40 uppercase">System Active</span>
                        </div>
                        <span className="text-[10px] font-bold opacity-30 tracking-widest uppercase italic">True_AI_v1.0</span>
                    </header>

                    <main className="flex-1 px-10 flex flex-col items-center justify-between py-16">
                        {step === 'home' ? (
                            <div className="flex flex-col items-center justify-between h-full w-full animate-in fade-in duration-1000">
                                {/* 標題：改為 掃描產品出廠價，粗體，中英混排 */}
                                <div className="text-center">
                                    <h2 className="text-4xl font-[900] tracking-tighter mb-2">掃描產品出廠價</h2>
                                    <p className="text-slate-500 text-xs font-medium tracking-wide">Decode the real factory cost in seconds.</p>
                                </div>

                                {/* 巨大視覺中心：掃描球 */}
                                <div className="relative">
                                    <input type="file" accept="image/*" onChange={handleUpload} className="hidden" id="upload" />
                                    <label htmlFor="upload" className="cursor-pointer">
                                        {loading && <div className="liquid-scan"></div>}
                                        {loading && <div className="liquid-scan" style={{animationDelay: '1.5s'}}></div>}
                                        <div className="ai-core-btn">
                                            <div className="inner-glow"></div>
                                            <Icon name={loading ? "loader-2" : "scan-eye"} className={`w-10 h-10 ${loading ? 'animate-spin text-blue-500' : 'text-white'}`} />
                                            <span className="mt-4 text-[10px] font-black tracking-[0.5em] opacity-40">{loading ? "SCANNING" : "START SCAN"}</span>
                                        </div>
                                    </label>
                                </div>

                                {/* 功能描述 */}
                                <div className="text-center max-w-[200px]">
                                    <p className="text-[10px] text-slate-600 leading-relaxed font-bold uppercase tracking-widest">
                                        Upload product image to reveal 1688 factory base price.
                                    </p>
                                </div>
                            </div>
                        ) : (
                            <div className="w-full space-y-6 animate-in slide-in-from-bottom-10">
                                <div className="glass-panel p-8">
                                    <p className="text-[9px] text-blue-500 font-black tracking-[0.2em] mb-2 uppercase italic">Result Analysis</p>
                                    <p className="text-2xl font-[900] italic tracking-tight">{result.name}</p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-6 flex flex-col justify-center">
                                        <p className="text-[9px] text-slate-600 font-bold mb-1 uppercase tracking-widest">Retail</p>
                                        <p className="text-xl font-bold opacity-30 line-through tracking-tighter">${result.retail}</p>
                                    </div>
                                    <div className="glass-panel p-6 border-blue-500/30 ring-1 ring-blue-500/20">
                                        <p className="text-[9px] text-blue-500 font-bold mb-1 uppercase tracking-widest italic">Factory</p>
                                        <p className="text-3xl font-[900] tracking-tighter text-blue-500">${result.factory}</p>
                                    </div>
                                </div>

                                <div className="glass-panel p-8 flex justify-between items-center">
                                    <div>
                                        <p className="text-[9px] text-slate-600 font-bold uppercase tracking-widest mb-1">Profit Markup</p>
                                        <p className="text-4xl font-[900] tracking-tighter">+{result.markup}%</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full border border-white/5 flex items-center justify-center">
                                        <Icon name="trending-up" className="w-6 h-6 text-slate-700" />
                                    </div>
                                </div>

                                <button className="w-full bg-white text-black py-7 rounded-[20px] font-[900] text-lg flex items-center justify-center gap-3 active:scale-95 transition-all uppercase italic tracking-tighter">
                                    <Icon name="video" className="w-6 h-6" /> TikTok Script
                                </button>
                                <button onClick={() => setStep('home')} className="w-full text-[9px] text-slate-700 font-bold tracking-[0.5em] uppercase text-center">Terminate Session</button>
                            </div>
                        )}
                    </main>

                    {/* Navbar: 磨砂極簡 */}
                    <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-10 flex justify-around items-center z-20">
                        <div className="text-blue-500 flex flex-col items-center gap-1">
                            <Icon name="scan" className="w-6 h-6" />
                            <div className="w-1 h-1 bg-blue-500 rounded-full"></div>
                        </div>
                        <div className="text-white opacity-20"><Icon name="trending-up" className="w-6 h-6" /></div>
                        <div className="text-white opacity-20"><Icon name="user" className="w-6 h-6" /></div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
